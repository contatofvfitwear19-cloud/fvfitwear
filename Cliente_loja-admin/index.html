<!DOCTYPE html>
<html lang="pt-br">
<link rel="icon" href="img/shield-icon.png" type="image/png">
<head>
    <meta charset="UTF-8">
    <title>Painel de Controle | FV Fitwear</title>
    <style>
        body {
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #d4af37;
            text-align: center;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            width: 300px;
        }
        h2 { color: #d4af37; margin-bottom: 25px; letter-spacing: 2px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #d4af37;
            border: none;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }
        button:hover { background: #fff; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>ADMIN LOGIN</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="checkLogin()">ACESSAR SISTEMA</button>
    </div>

    <script>
        function checkLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "admin" && p === "admin123") {
                // Redireciona para o painel principal que tem os gráficos
                window.location.href = "dashboard_admin_final.html";
            } else {
                alert("Acesso negado.");
            }
        }
    </script>
</body>
</html>
