<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Produto | FV Fitwear</title>

    <!-- FONT AWESOME -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    >

    <!-- STYLES -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="produto.css">

</head>

<body class="dark-theme">

    <!-- =========================================================
        NAVBAR
    ========================================================== -->

    <nav class="product-nav">

        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
        </a>

        <div class="brand">
            FV FITWEAR
        </div>

        <div class="nav-icons">

            <i class="fas fa-share-alt"></i>

            <div class="cart-icon" id="open-cart-btn">

                <i class="fas fa-shopping-bag"></i>

                <span class="cart-counter">
                    0
                </span>

            </div>

        </div>

    </nav>

    <!-- =========================================================
        CART SIDEBAR
    ========================================================== -->

    <aside class="cart-sidebar">

        <div class="cart-header">

            <h2>SEU CARRINHO</h2>

            <button class="close-cart">
                &times;
            </button>

        </div>

        <div class="cart-items"></div>

        <!-- CHECKOUT -->

        <div class="cart-checkout-form">
            <h3>DADOS PARA ENTREGA</h3>
            
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="cart-address" placeholder="Rua, Bairro..." style="flex: 2; margin-bottom: 0;">
                <input type="text" id="cart-number" placeholder="Número" style="flex: 1; margin-bottom: 0;">
            </div>

            <h3>FORMA DE PAGAMENTO</h3>
            <select id="cart-payment">
                <option value="Pix">Pix (5% de desconto)</option>
                <option value="Dinheiro">Dinheiro</option>
                <option value="Cartão de Crédito">Cartão de Crédito</option>
                <option value="Cartão de Débito">Cartão de Débito</option>
            </select>
        </div>

        <!-- CART FOOTER -->
        <div class="cart-footer">

            <!-- ADICIONE ESTA LINHA ABAIXO PARA EXIBIR O TOTAL -->
            <div id="cart-total-display" style="color: #fff; font-size: 16px; margin-bottom: 15px; text-align: center; font-family: 'Segoe UI', sans-serif;"></div>

            <button class="finish-order">
                ENVIAR VIA WHATSAPP
            </button>

        </div>

    </aside>

    <div class="cart-overlay"></div>

    <!-- =========================================================
        PRODUCT SECTION
    ========================================================== -->

    <div class="product-wrapper">

        <!-- GALLERY -->

        <section class="gallery-container">

            <div class="main-display">

                <img
                    src="img/produto-principal.jpg"
                    id="main-view"
                    alt="Produto FV Fitwear"
                >

            </div>

            <div class="thumb-strip">

                <img
                    src="img/thumb1.jpg"
                    class="thumb active"
                    alt="Miniatura 1"
                >

                <img
                    src="img/thumb2.jpg"
                    class="thumb"
                    alt="Miniatura 2"
                >

                <img
                    src="img/thumb3.jpg"
                    class="thumb"
                    alt="Miniatura 3"
                >

            </div>

        </section>

        <!-- PRODUCT INFO -->

        <section class="info-container">

            <div class="product-header">

                <span class="category-tag">
                    BLACK GOLD COLLECTION
                </span>

                <h1>
                    CONJUNTO BLACK GOLD
                </h1>

                <p class="price-main">
                    R$ 249,90
                </p>

                <p class="installments">
                    ou 6x de R$ 41,65 sem juros
                </p>

            </div>

            <!-- COLOR SELECT -->

            <div class="selector-group">

                <label>
                    ESCOLHA A COR
                </label>

                <div class="color-options">

                    <div
                        class="dot active"
                        data-color="Preto"
                        style="background:#000;"
                    ></div>

                    <div
                        class="dot"
                        data-color="Cinza"
                        style="background:#333;"
                    ></div>

                    <div
                        class="dot"
                        data-color="Dourado"
                        style="background:#d4af37;"
                    ></div>

                </div>

            </div>

            <!-- SIZE SELECT -->

            <div class="selector-group">

                <label>
                    SELECIONE O TAMANHO
                </label>

                <div class="size-options">

                    <button type="button">
                        PP
                    </button>

                    <button
                        type="button"
                        class="selected"
                    >
                        P
                    </button>

                    <button type="button">
                        M
                    </button>

                    <button type="button">
                        G
                    </button>

                    <button type="button">
                        GG
                    </button>

                </div>

            </div>

            <div class="selector-group">
                <label>QUANTIDADE (<span id="stock-display" style="color: #d4af37; font-weight: bold;">Carregando estoque...</span>)</label>
                <div class="quantity-selector" style="margin-top: 10px;">
                    <input 
                        type="number" 
                        id="product-quantity" 
                        value="1" 
                        min="1" 
                        style="width: 80px; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 5px; text-align: center; font-weight: bold;"
                    >
                </div>
            </div>

            <!-- BUY BUTTON -->

            <button class="btn-buy-now">

                <i class="fas fa-bolt"></i>

                ADICIONAR AO CARRINHO

            </button>

            <!-- DESCRIPTION -->

            <div class="product-specs">

                <details open>

                    <summary>
                        DESCRIÇÃO
                    </summary>

                    <p>
                        Tecido de alta compressão com tecnologia Dry-Fit,
                        ideal para treinos de alta performance.
                    </p>

                </details>

            </div>

        </section>

    </div>

    <!-- =========================================================
        SCRIPTS
    ========================================================== -->

    <script src="script.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            
            const urlParams = new URLSearchParams(window.location.search);
            let productId = urlParams.get('id');

            if (!productId) {
                productId = localStorage.getItem('fv_current_product');
            }

            if (!productId) {
                alert("Erro: ID do produto não encontrado! Clique em OK para voltar.");
                window.location.href = 'index.html';
                return;
            }

            try {
                const response = await fetch(`http://localhost:3333/api/products/${productId}`);
                
                if (!response.ok) throw new Error('Produto não encontrado');
                
                const product = await response.json();

                document.querySelector('.product-header h1').innerText = product.name.toUpperCase();
                document.querySelector('.price-main').innerText = product.price.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                
                // Coloca a foto vinda do banco
                const mainView = document.getElementById('main-view');
                if (mainView) mainView.src = product.imageUrl;

                // Esconde as miniaturas, pois só temos 1 foto principal no banco
                const thumbStrip = document.querySelector('.thumb-strip');
                if (thumbStrip) thumbStrip.style.display = 'none';

                // =====================================================
                // NOVO: CARREGAR ESTOQUE E CONFIGURAR SELETOR DE QUANTIDADE
                // =====================================================
                const stockDisplay = document.getElementById('stock-display');
                const qtyInput = document.getElementById('product-quantity');

                if (product.stock <= 0) {
                    if (stockDisplay) {
                        stockDisplay.innerText = "Produto Esgotado";
                        stockDisplay.style.color = "red";
                    }
                    if (qtyInput) qtyInput.disabled = true;
                } else {
                    if (stockDisplay) {
                        stockDisplay.innerText = `${product.stock} disponíveis em estoque`;
                        stockDisplay.style.color = "#d4af37";
                    }
                    if (qtyInput) qtyInput.max = product.stock;
                }

                // 4. Monta as Bolinhas de Cores
                const colorsContainer = document.querySelector('.color-options');
                if (colorsContainer) {
                    colorsContainer.innerHTML = '';
                    if (product.colors) {
                        const colors = product.colors.split(',');
                        colors.forEach((color, index) => {
                            const isActive = index === 0 ? 'active' : '';
                            colorsContainer.innerHTML += `
                                <div class="dot ${isActive}" data-color="${color}" style="background: ${color};"></div>
                            `;
                        });
                    }
                }

                // 5. Monta os Botões de Tamanho
                const sizesContainer = document.querySelector('.size-options');
                if (sizesContainer) {
                    sizesContainer.innerHTML = '';
                    if (product.sizes) {
                        const sizes = product.sizes.split(',');
                        sizes.forEach((size, index) => {
                            const isSelected = index === 0 ? 'selected' : '';
                            sizesContainer.innerHTML += `
                                <button type="button" class="${isSelected}">${size}</button>
                            `;
                        });
                    }
                }

                // =====================================================
                // LÓGICA DE CLIQUE (Cores e Tamanhos)
                // =====================================================
                let selectedColor = product.colors ? product.colors.split(',')[0] : '';
                let selectedSize = product.sizes ? product.sizes.split(',')[0] : '';

                const colorDots = document.querySelectorAll('.dot');
                colorDots.forEach(dot => {
                    dot.addEventListener('click', () => {
                        colorDots.forEach(item => item.classList.remove('active'));
                        dot.classList.add('active');
                        selectedColor = dot.getAttribute('data-color');
                    });
                });

                const sizeButtons = document.querySelectorAll('.size-options button');
                sizeButtons.forEach(button => {
                    button.addEventListener('click', () => {
                        sizeButtons.forEach(btn => btn.classList.remove('selected'));
                        button.classList.add('selected');
                        selectedSize = button.innerText;
                    });
                });

                // =====================================================
                // ADICIONAR AO CARRINHO E SIDEBAR
                // =====================================================
                const cartSidebar = document.querySelector('.cart-sidebar');
                const cartOverlay = document.querySelector('.cart-overlay');
                const openCartBtn = document.getElementById('open-cart-btn');

                if (openCartBtn) {
                    openCartBtn.addEventListener('click', () => {
                        cartSidebar.classList.add('active');
                        cartOverlay.classList.add('active');
                    });
                }

                const closeCartBtn = document.querySelector('.close-cart');
                if (closeCartBtn) {
                    closeCartBtn.addEventListener('click', () => {
                        cartSidebar.classList.remove('active');
                        cartOverlay.classList.remove('active');
                    });
                }

                // =====================================================
                // ADICIONAR AO CARRINHO (Com Feedback Visual e Quantidade)
                // =====================================================
                const btnBuyNow = document.querySelector('.btn-buy-now');
                if (btnBuyNow) {
                    btnBuyNow.addEventListener('click', () => {
                        
                        const qtyInputElement = document.getElementById('product-quantity');
                        const selectedQty = qtyInputElement ? parseInt(qtyInputElement.value) || 1 : 1;

                        if (selectedQty > product.stock) {
                            alert(`Ops! Só temos ${product.stock} unidades disponíveis no momento.`);
                            return;
                        }

                        if (selectedQty <= 0) {
                            alert(`Por favor, insira uma quantidade válida.`);
                            return;
                        }

                        // Força passar o preço limpo do produto direto do objeto da API
                        const productToCart = {
                            productId: product.id,
                            name: product.name,
                            price: String(product.price), // Passa o preço numérico puro convertido para string
                            size: selectedSize,
                            color: selectedColor,
                            img: product.imageUrl,
                            quantity: selectedQty
                        };

                        let cart = JSON.parse(localStorage.getItem('fv_cart')) || [];
                        cart.push(productToCart);
                        localStorage.setItem('fv_cart', JSON.stringify(cart));

                        // Força a chamada global para renderizar o carrinho imediatamente
                        if (typeof window.renderCart === 'function') {
                            window.renderCart();
                        }

                        // FEEDBACK VISUAL NO BOTÃO
                        const originalText = btnBuyNow.innerHTML;
                        const originalBg = btnBuyNow.style.background;
                        
                        btnBuyNow.innerHTML = '<i class="fas fa-check"></i> ADICIONADO!';
                        btnBuyNow.style.background = '#4CAF50';
                        btnBuyNow.style.color = '#fff';

                        setTimeout(() => {
                            btnBuyNow.innerHTML = originalText;
                            btnBuyNow.style.background = originalBg;
                            btnBuyNow.style.color = '';
                        }, 2000);
                    });
                }

            } catch (error) {
                console.error('Erro:', error);
                alert('Produto indisponível ou erro ao se conectar com o servidor.');
            }
        });
    </script>

</body>

</html>
